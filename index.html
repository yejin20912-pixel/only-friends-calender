<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>약속 달력</title>
    <link rel="stylesheet" href="./styles.css?v=20260424-3" />
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <h1>Only Friends</h1>
        <p>꼭 만나는 날이 있기를 기원하며 만들어보았습니다. 제발 만나요 우리~</p>
      </header>

      <nav class="screen-tabs" aria-label="화면 전환">
        <button id="showInputButton" class="screen-tab is-active" type="button" aria-pressed="true">입력</button>
        <button id="showResultButton" class="screen-tab" type="button" aria-pressed="false">결과표</button>
      </nav>

      <section id="inputScreen" class="screen is-active" aria-label="입력 화면">
        <section class="card summary-card">
          <div class="summary-inline">
            <span class="summary-inline-label">제출 현황</span>
            <strong id="submitStatus">0/6 제출</strong>
          </div>
          <button id="resetAllButton" class="action-button secondary" type="button">전체 초기화</button>
        </section>

        <section class="card">
          <div class="section-head">
            <div>
              <h2>친구 선택</h2>
            </div>
          </div>
          <div id="personList" class="person-list"></div>
        </section>

        <section class="card">
          <div class="current-person">
            <strong id="selectedPersonLabel">예원</strong>
            <span class="current-person-guide" id="selectedPersonGuide">가능한 날짜를 선택해주세요</span>
          </div>

          <div class="status-buttons" role="group" aria-label="상태 선택">
            <button class="status-button is-active" type="button" data-mode="available">가능</button>
            <button class="status-button" type="button" data-mode="maybe">애매</button>
            <button class="status-button" type="button" data-mode="busy">불가</button>
          </div>

          <div class="calendar-shell">
            <div class="calendar-head">
              <button id="prevMonthButton" class="icon-button" type="button" aria-label="이전 달">‹</button>
              <strong id="monthLabel">0000년 0월</strong>
              <button id="nextMonthButton" class="icon-button" type="button" aria-label="다음 달">›</button>
            </div>

            <div class="legend">
              <span class="legend-chip available">가능</span>
              <span class="legend-chip maybe">애매</span>
              <span class="legend-chip busy">불가</span>
            </div>

            <div id="inputCalendar" class="calendar-wrap"></div>
          </div>

          <button id="submitButton" class="action-button primary submit-inline" type="button">제출하기</button>
        </section>

        <button id="goToResultButton" class="footer-button" type="button">결과표 보기</button>
      </section>

      <section id="resultScreen" class="screen" aria-label="결과 화면">
        <section class="card summary-card">
          <div>
            <span class="label">모두 가능한 날짜</span>
            <strong id="perfectCount">0일</strong>
          </div>
          <button id="copyButton" class="action-button secondary" type="button">결과 복사</button>
        </section>

        <section class="card">
          <div class="section-head">
            <div>
              <h2>결과 달력</h2>
              <p class="subtext">모두 가능은 주황 포인트, 일부 가능은 회색 카드로 구분됩니다.</p>
            </div>
          </div>

          <div class="calendar-shell">
            <div class="calendar-head">
              <button id="resultPrevMonthButton" class="icon-button" type="button" aria-label="이전 달">‹</button>
              <strong id="resultMonthLabel">0000년 0월</strong>
              <button id="resultNextMonthButton" class="icon-button" type="button" aria-label="다음 달">›</button>
            </div>

            <div class="legend">
              <span class="legend-chip perfect">모두 가능</span>
              <span class="legend-chip partial">일부 가능</span>
              <span class="legend-chip none">0명 가능</span>
            </div>

            <div id="resultCalendar" class="calendar-wrap"></div>
          </div>
        </section>

        <section class="card">
          <div class="section-head">
            <div>
              <h2>날짜 상세</h2>
            </div>
          </div>
          <div id="dateDetails" class="detail-box">결과 달력에서 날짜를 누르면 가능한 사람 이름이 표시됩니다.</div>
        </section>

        <button id="backToInputButton" class="footer-button muted" type="button">입력 화면으로</button>
      </section>
    </main>

    <script src="./firebase-config.js?v=20260424-3"></script>
    <script src="./app.js?v=20260424-3"></script>
  </body>
</html>
